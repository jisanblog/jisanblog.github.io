<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JISAN · লকড অ্যাডমিন</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Alex+Brush&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #e9eff7;
      font-family: 'Inter', sans-serif;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* লগইন ওভারলে (শুরুতেই দেখাবে) */
    .login-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 30, 50, 0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .login-box {
      background: white;
      padding: 40px 32px;
      border-radius: 36px;
      box-shadow: 0 30px 45px -15px #0f1e2e;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .login-box h2 {
      font-size: 1.8rem;
      color: #0f2b4f;
      margin-bottom: 10px;
    }
    .login-box p { color: #445e7e; margin-bottom: 24px; }
    .login-box input {
      width: 100%;
      padding: 16px 18px;
      border: 1.5px solid #ccdaea;
      border-radius: 48px;
      font-size: 1rem;
      margin-bottom: 18px;
      outline: none;
    }
    .login-box input:focus { border-color: #1e3c72; }
    .login-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 48px;
      background: #1e3c72;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .login-btn:hover { background: #0f2b4f; }
    .error-msg {
      color: #c23b3b;
      margin-top: 12px;
      font-size: 0.9rem;
      min-height: 24px;
    }
    .hint {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #7a8ba1;
    }

    /* অ্যাডমিন লেআউট (লগইন পরেই দৃশ্যমান) */
    .admin-layout {
      max-width: 1400px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .edit-panel, .preview-panel {
      background: #ffffff;
      border-radius: 28px;
      padding: 28px 24px;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.08);
      border: 1px solid #eef2f6;
    }
    h2 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #0f2b4f;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 16px;
    }
    .form-grid { display: flex; flex-direction: column; gap: 18px; }
    .field-group label {
      display: block;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #475569;
      margin-bottom: 5px;
    }
    .field-group input, .field-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #d1d9e6;
      border-radius: 18px;
      font-size: 15px;
      background: #fafcff;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .field-group input:focus, .field-group textarea:focus {
      border-color: #1e3c72;
      outline: none;
      background: white;
      box-shadow: 0 0 0 3px #1e3c7215;
    }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .action-bar { display: flex; gap: 12px; margin-top: 20px; }
    .btn {
      flex: 1;
      padding: 14px 10px;
      border-radius: 40px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
      background: #f1f5f9;
      color: #1e293b;
      border: 1px solid #cbd5e1;
    }
    .btn-primary { background: #1e3c72; color: white; border: none; }
    .btn-primary:hover { background: #102a4c; }
    .btn-success { background: #0f2b4f; color: white; }
    .copy-feedback { margin-top: 12px; font-size: 0.8rem; color: #2b6e3b; text-align: center; }

    /* প্রিভিউ কার্ড */
    .preview-card {
      background: #fbfdff;
      border-radius: 24px;
      padding: 1.8rem 1.6rem;
      border: 1px solid #dfe7f0;
      max-width: 560px;
      margin: 0 auto;
    }
    .preview-avatar { text-align: center; margin-bottom: 1rem; }
    .preview-avatar img {
      width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
      border: 3px solid white; box-shadow: 0 12px 22px -8px rgba(0,0,0,0.15);
      background: #eef2fa;
    }
    .preview-signature {
      font-family: 'Alex Brush', cursive;
      font-size: 2.5rem; text-align: center; color: #0b2b4f;
    }
    .preview-badge-wrap { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
    .preview-badge {
      background: #1e3c72; color: white; padding: 4px 12px;
      border-radius: 40px; font-size: 0.75rem; font-weight: 600;
    }
    .preview-tagline {
      text-align: center; font-size: 0.85rem; background: #eef3fc;
      padding: 8px 16px; border-radius: 50px; margin: 12px 0;
    }
    .marquee-preview {
      background: #eef3fc; border-radius: 60px; padding: 10px;
      margin: 16px 0; overflow: hidden; white-space: nowrap;
      border: 1px solid #e2edff;
    }
    .preview-services {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0;
    }
    .preview-contact-row {
      background: #eef4fc; border-radius: 24px; padding: 12px 16px;
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between;
    }
    @media (max-width: 800px) {
      .admin-layout { grid-template-columns: 1fr; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- লগইন স্ক্রিন (পাসওয়ার্ড প্রোটেকশন) -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <h2><i class="fas fa-lock" style="color:#1e3c72;"></i> অ্যাডমিন লগইন</h2>
    <p>পাসওয়ার্ড দিয়ে প্রবেশ করুন</p>
    <input type="password" id="passwordInput" placeholder="••••••••" autofocus>
    <button class="login-btn" id="loginBtn"><i class="fas fa-arrow-right"></i> লগইন</button>
    <div id="loginError" class="error-msg"></div>
    <div class="hint">
      <i class="far fa-question-circle"></i> ডেমো পাসওয়ার্ড: jisan2026<br>
      (নিরাপত্তার জন্য ব্রাউজার সোর্সে দেখা যাবে)
    </div>
  </div>
</div>

<!-- মূল অ্যাডমিন প্যানেল (প্রথমে লুকানো) -->
<div id="adminMain" class="admin-layout hidden">
  <!-- বাম এডিট প্যানেল -->
  <div class="edit-panel">
    <h2><i class="fas fa-pen-to-square" style="color:#1e3c72;"></i> কনটেন্ট এডিটর</h2>
    <div class="form-grid">
      <div class="field-group"><label>পুরো নাম</label><input type="text" id="fullName" value="Jisan Al Mahmud"></div>
      <div class="row-2">
        <div class="field-group"><label>ট্যাগলাইন</label><input type="text" id="tagline" value="Web Developer | Frontend Specialist"></div>
        <div class="field-group"><label>অবস্থা</label><input type="text" id="availability" value="Available"></div>
      </div>
      <div class="field-group"><label>মার্কি টেক্সট</label><input type="text" id="marqueeText" value="Assalamualaikum welcome to JISAN website ✦ Web solutions ✦"></div>
      <div class="row-2">
        <div class="field-group"><label>ইমেইল</label><input type="email" id="email" value="jisan0538@gmail.com"></div>
        <div class="field-group"><label>ফোন</label><input type="text" id="phone" value="01309488169"></div>
      </div>
      <div class="row-2">
        <div class="field-group"><label>হোয়াটসঅ্যাপ</label><input type="text" id="whatsapp" value="+880 1309 488169"></div>
        <div class="field-group"><label>ফেসবুক ইউজার</label><input type="text" id="facebookUser" value="economist.jisan"></div>
      </div>
      <div class="field-group"><label>সেবাসমূহ (কমা দিয়ে)</label><input type="text" id="servicesInput" value="Web Design, Frontend Dev, Landing Pages, Support & Fixes"></div>
      <div class="action-bar">
        <button class="btn" id="resetToDefault"><i class="fas fa-undo-alt"></i> রিসেট</button>
        <button class="btn-primary" id="applyChanges"><i class="fas fa-sync-alt"></i> প্রিভিউ আপডেট</button>
      </div>
      <button class="btn btn-success" id="copyFullHTML"><i class="fas fa-copy"></i> 📋 সম্পূর্ণ HTML কপি করুন</button>
      <div id="copyMessage" class="copy-feedback"></div>
    </div>
  </div>
  <!-- ডান প্রিভিউ -->
  <div class="preview-panel">
    <h2><i class="fas fa-eye"></i> লাইভ প্রিভিউ</h2>
    <div id="livePreview" class="preview-card"></div>
  </div>
</div>

<script>
  (function(){
    // ---------- পাসওয়ার্ড সেটিং ----------
    const CORRECT_PASSWORD = "jisan2026";   // এখানে ইচ্ছামতো বদলাতে পারেন
    const loginOverlay = document.getElementById('loginOverlay');
    const adminMain = document.getElementById('adminMain');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    // লগইন চেক
    function checkPassword() {
      if (passwordInput.value === CORRECT_PASSWORD) {
        loginOverlay.classList.add('hidden');
        adminMain.classList.remove('hidden');
        renderPreview(); // লগইনের পর প্রিভিউ রেন্ডার
      } else {
        loginError.innerText = '❌ ভুল পাসওয়ার্ড, আবার চেষ্টা করুন';
        passwordInput.value = '';
        passwordInput.focus();
      }
    }

    loginBtn.addEventListener('click', checkPassword);
    passwordInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPassword(); });

    // ---------- অ্যাডমিন ফাংশনালিটি ----------
    const fullNameInp = document.getElementById('fullName');
    const taglineInp = document.getElementById('tagline');
    const availabilityInp = document.getElementById('availability');
    const marqueeInp = document.getElementById('marqueeText');
    const emailInp = document.getElementById('email');
    const phoneInp = document.getElementById('phone');
    const whatsappInp = document.getElementById('whatsapp');
    const fbUserInp = document.getElementById('facebookUser');
    const servicesInp = document.getElementById('servicesInput');
    const previewDiv = document.getElementById('livePreview');
    const copyMsg = document.getElementById('copyMessage');

    const defaults = {
      fullName: 'Jisan Al Mahmud',
      tagline: 'Web Developer | Frontend Specialist',
      availability: 'Available',
      marquee: 'Assalamualaikum welcome to JISAN website ✦ Web solutions ✦',
      email: 'jisan0538@gmail.com',
      phone: '01309488169',
      whatsapp: '+880 1309 488169',
      fbUser: 'economist.jisan',
      services: 'Web Design, Frontend Dev, Landing Pages, Support & Fixes'
    };

    function setInputDefaults() {
      fullNameInp.value = defaults.fullName;
      taglineInp.value = defaults.tagline;
      availabilityInp.value = defaults.availability;
      marqueeInp.value = defaults.marquee;
      emailInp.value = defaults.email;
      phoneInp.value = defaults.phone;
      whatsappInp.value = defaults.whatsapp;
      fbUserInp.value = defaults.fbUser;
      servicesInp.value = defaults.services;
    }

    function renderPreview() {
      const name = fullNameInp.value.trim() || defaults.fullName;
      const tag = taglineInp.value.trim() || defaults.tagline;
      const avail = availabilityInp.value.trim() || defaults.availability;
      const marq = marqueeInp.value.trim() || defaults.marquee;
      const emailVal = emailInp.value.trim() || defaults.email;
      const phoneVal = phoneInp.value.trim() || defaults.phone;
      const waVal = whatsappInp.value.trim() || defaults.whatsapp;
      const fbUser = fbUserInp.value.trim() || defaults.fbUser;
      let services = servicesInp.value.split(',').map(s => s.trim()).filter(s => s);
      if (!services.length) services = ['Web Design', 'Frontend Dev', 'Landing Pages', 'Support'];
      
      const serviceItems = services.slice(0,4).map(s => 
        `<div style="background:#f1f6fe;border-radius:2rem;padding:0.65rem;text-align:center;font-size:0.8rem;font-weight:600;"><i class="fas fa-code"></i> ${s}</div>`
      ).join('');
      
      const waNumber = waVal.replace(/\D/g, '');
      previewDiv.innerHTML = `
        <div class="preview-avatar"><img src="jisan.jpeg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'48\' fill=\'%231e3c72\'/%3E%3Ctext x=\'50\' y=\'68\' font-size=\'46\' text-anchor=\'middle\' fill=\'%23fff\'%3EJ%3C/text%3E%3C/svg%3E';"></div>
        <div class="preview-signature">${name}</div>
        <div class="preview-badge-wrap">
          <span class="preview-badge"><i class="fas fa-graduation-cap"></i> Student</span>
          <span class="preview-badge"><i class="fas fa-laptop-code"></i> Freelancer</span>
          <span class="preview-badge"><i class="fas fa-check-circle"></i> ${avail}</span>
        </div>
        <div class="preview-tagline">${tag}</div>
        <div class="marquee-preview"><div style="display:inline-block;white-space:nowrap;animation:scrollText 14s linear infinite;font-weight:600;color:#1e3c72;"><i class="fas fa-hand-peace"></i> ${marq}</div></div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:20px 0">
          <a href="mailto:${emailVal}" style="background:white;border:1px solid #ccc;padding:8px;border-radius:40px;text-align:center;color:#1e3c72;text-decoration:none;"><i class="fas fa-envelope"></i></a>
          <a href="tel:${phoneVal}" style="background:#1e3c72;color:white;padding:8px;border-radius:40px;text-align:center;text-decoration:none;"><i class="fas fa-phone"></i></a>
          <a href="https://wa.me/${waNumber}" style="background:#25D366;color:white;padding:8px;border-radius:40px;text-align:center;text-decoration:none;"><i class="fab fa-whatsapp"></i></a>
          <a href="https://facebook.com/${fbUser}" style="background:white;border:1px solid #ccc;padding:8px;border-radius:40px;text-align:center;color:#1e3c72;text-decoration:none;"><i class="fab fa-facebook-f"></i></a>
        </div>
        <div style="font-weight:700;margin:10px 0">what I deliver</div>
        <div class="preview-services">${serviceItems}</div>
        <div class="preview-contact-row">
          <span><i class="fas fa-envelope"></i> ${emailVal}</span>
          <span><i class="fas fa-phone"></i> ${phoneVal}</span>
          <span><i class="fab fa-whatsapp"></i> ${waVal}</span>
        </div>
        <div style="margin-top:20px;font-size:0.7rem;text-align:center;">© 2026 ${name.split(' ')[0]} · freelance</div>
      `;
    }

    function generateFullSiteHTML() {
      const name = fullNameInp.value.trim() || defaults.fullName;
      const tag = taglineInp.value.trim() || defaults.tagline;
      const avail = availabilityInp.value.trim() || defaults.availability;
      const marq = marqueeInp.value.trim() || defaults.marquee;
      const emailVal = emailInp.value.trim() || defaults.email;
      const phoneVal = phoneInp.value.trim() || defaults.phone;
      const waVal = whatsappInp.value.trim() || defaults.whatsapp;
      const fbUser = fbUserInp.value.trim() || defaults.fbUser;
      let services = servicesInp.value.split(',').map(s => s.trim()).filter(s => s);
      if (!services.length) services = ['Web Design','Frontend Dev','Landing Pages','Support'];
      const serviceHTML = services.slice(0,4).map(s => `<div class="service-chip"><i class="fas fa-code"></i> ${s}</div>`).join('');
      const waNumber = waVal.replace(/\D/g, '');
      return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${name}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Alex+Brush&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#eef2f9;font-family:Inter,sans-serif;padding:1.5rem;display:flex;justify-content:center;min-height:100vh;align-items:center}.card{max-width:560px;background:white;border-radius:2rem;padding:1.8rem;box-shadow:0 20px 35px -12px rgba(0,0,0,0.1)}.avatar{width:110px;height:110px;border-radius:50%}.signature{font-family:'Alex Brush',cursive;font-size:2.5rem;text-align:center}.badge{background:#1e3c72;color:white;padding:4px 12px;border-radius:40px;font-size:.75rem}.marquee{background:#eef3fc;border-radius:60px;padding:10px;overflow:hidden;white-space:nowrap}@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}</style></head><body><div class="card"><div style="text-align:center"><img src="jisan.jpeg" class="avatar" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 100 100\\'%3E%3Ccircle cx=\\'50\\' cy=\\'50\\' r=\\'48\\' fill=\\'%231e3c72\\'/%3E%3Ctext x=\\'50\\' y=\\'68\\' font-size=\\'46\\' fill=\\'%23fff\\'%3EJ%3C/text%3E%3C/svg%3E'"></div><div class="signature">${name}</div><div style="display:flex;justify-content:center;gap:8px;margin:10px"><span class="badge">Student</span><span class="badge">Freelancer</span><span class="badge">${avail}</span></div><div style="text-align:center;margin:10px">${tag}</div><div class="marquee"><div style="display:inline-block;animation:scroll 14s linear infinite;font-weight:600">${marq}</div></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:20px 0"><a href="mailto:${emailVal}" style="padding:8px;border-radius:40px;background:#fff;border:1px solid #ccc;text-align:center"><i class="fas fa-envelope"></i></a><a href="tel:${phoneVal}" style="padding:8px;border-radius:40px;background:#1e3c72;color:#fff;text-align:center"><i class="fas fa-phone"></i></a><a href="https://wa.me/${waNumber}" style="padding:8px;border-radius:40px;background:#25D366;color:#fff;text-align:center"><i class="fab fa-whatsapp"></i></a><a href="https://facebook.com/${fbUser}" style="padding:8px;border-radius:40px;background:#fff;border:1px solid #ccc;text-align:center"><i class="fab fa-facebook-f"></i></a></div><div style="font-weight:700">what I deliver</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0">${serviceHTML}</div><div style="background:#eef4fc;border-radius:24px;padding:12px;display:flex;flex-wrap:wrap;gap:8px"><span>📧 ${emailVal}</span><span>📞 ${phoneVal}</span><span>💬 ${waVal}</span></div><div style="text-align:center;margin-top:20px;font-size:.7rem">© 2026 ${name.split(' ')[0]}</div></div></body></html>`;
    }

    async function copyFullCode() {
      try {
        await navigator.clipboard.writeText(generateFullSiteHTML());
        copyMsg.innerText = '✅ HTML কপি হয়েছে! index.html আপডেট করুন।';
      } catch { copyMsg.innerText = '❌ কপি ব্যর্থ'; }
      setTimeout(() => copyMsg.innerText = '', 3000);
    }

    document.getElementById('applyChanges').addEventListener('click', renderPreview);
    document.getElementById('resetToDefault').addEventListener('click', () => { setInputDefaults(); renderPreview(); });
    document.getElementById('copyFullHTML').addEventListener('click', copyFullCode);
    setInputDefaults();
    // (প্রিভিউ আগে থেকে রেন্ডার করব না, লগইনের পর হবে)
  })();
</script>
</body>
</html>
