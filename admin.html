<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>অ্যাডমিন · Jisan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Alex+Brush&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{background:#e9eff7;font-family:'Inter',sans-serif;padding:24px;min-height:100vh;display:flex;justify-content:center;align-items:center}.lock-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(18,30,45,0.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:999}.lock-card{background:#fff;padding:38px 32px;border-radius:36px;box-shadow:0 30px 45px -15px #0a1a2a;max-width:380px;width:90%;text-align:center}.lock-card h2{font-size:1.8rem;color:#0f2b4f;margin-bottom:16px}.lock-card input{width:100%;padding:16px 18px;border:1.5px solid #ccdaea;border-radius:48px;font-size:1rem;margin-bottom:20px;outline:none}.lock-card input:focus{border-color:#1e3c72}.btn{width:100%;padding:16px;border:none;border-radius:48px;background:#1e3c72;color:#fff;font-weight:700;font-size:1.1rem;cursor:pointer}.error-message{color:#c23b3b;margin-top:12px;font-size:0.9rem;min-height:28px}.admin-main{max-width:1300px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:24px}.panel{background:#fff;border-radius:28px;padding:28px 24px;box-shadow:0 20px 35px -10px rgba(0,0,0,0.08)}h2{font-size:1.7rem;color:#0f2b4f;margin-bottom:22px;border-bottom:2px solid #e2e8f0;padding-bottom:14px}.field{margin-bottom:18px}.field label{font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.3px;color:#475569}.field input{width:100%;padding:12px 16px;border:1.5px solid #d1d9e6;border-radius:18px;font-size:15px;background:#fafcff}.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.btn-outline{background:#fff;color:#1e293b;border:1px solid #cbd5e1}.btn-primary{background:#1e3c72;color:#fff}.btn-success{background:#0f2b4f;color:#fff}.action-bar{display:flex;gap:12px;margin-top:24px}.preview-card{background:#fbfdff;border-radius:24px;padding:1.8rem 1.6rem;border:1px solid #dfe7f0}.avatar-preview img{width:110px;height:110px;border-radius:50%;border:3px solid white;box-shadow:0 12px 22px -8px rgba(0,0,0,0.15)}.signature-preview{font-family:'Alex Brush',cursive;font-size:2.5rem;color:#0b2b4f;text-align:center}.badge-wrap{display:flex;justify-content:center;gap:8px;margin:10px 0}.badge{background:#1e3c72;color:#fff;padding:4px 12px;border-radius:40px;font-size:0.75rem}.hidden{display:none!important}@media(max-width:700px){.admin-main{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- লগইন স্ক্রিন -->
<div id="loginScreen" class="lock-screen">
  <div class="lock-card">
    <h2><i class="fas fa-shield-hal"></i> অ্যাডমিন</h2>
    <input type="password" id="passwordInput" placeholder="পাসওয়ার্ড" autofocus>
    <button class="btn" id="loginBtn">প্রবেশ করুন</button>
    <div id="loginError" class="error-message"></div>
  </div>
</div>

<!-- প্রধান অ্যাডমিন প্যানেল -->
<div id="adminPanel" class="admin-main hidden">
  <div class="panel">
    <h2><i class="fas fa-edit"></i> কনটেন্ট এডিটর</h2>
    <div class="field"><label>নাম</label><input id="fullName" value="Jisan Al Mahmud"></div>
    <div class="row2">
      <div class="field"><label>ট্যাগলাইন</label><input id="tagline" value="Web Developer | Frontend Specialist"></div>
      <div class="field"><label>অবস্থা</label><input id="availability" value="Available"></div>
    </div>
    <div class="field"><label>মার্কি বার্তা</label><input id="marqueeText" value="Assalamualaikum welcome to JISAN website ✦ Web solutions ✦"></div>
    <div class="row2">
      <div class="field"><label>ইমেইল</label><input id="email" value="jisan0538@gmail.com"></div>
      <div class="field"><label>ফোন</label><input id="phone" value="01309488169"></div>
    </div>
    <div class="row2">
      <div class="field"><label>হোয়াটসঅ্যাপ</label><input id="whatsapp" value="+880 1309 488169"></div>
      <div class="field"><label>ফেসবুক ইউজার</label><input id="facebookUser" value="economist.jisan"></div>
    </div>
    <div class="field"><label>সেবা (কমা দিয়ে)</label><input id="servicesInput" value="Web Design, Frontend Dev, Landing Pages, Support & Fixes"></div>
    <div class="action-bar">
      <button class="btn btn-outline" id="resetBtn"><i class="fas fa-undo-alt"></i> রিসেট</button>
      <button class="btn btn-primary" id="previewBtn"><i class="fas fa-sync-alt"></i> প্রিভিউ</button>
    </div>
    <button class="btn btn-success" id="copyBtn" style="margin-top:16px;"><i class="fas fa-copy"></i> HTML কপি করুন</button>
    <div id="copyMsg" style="text-align:center; margin-top:12px; font-size:0.8rem; color:#2b6e3b;"></div>
  </div>
  <div class="panel">
    <h2><i class="fas fa-eye"></i> প্রিভিউ</h2>
    <div id="previewArea" class="preview-card"></div>
  </div>
</div>

<script>
  (function(){
    // ---------- সুরক্ষা: পাসওয়ার্ড হ্যাশ (SHA‑256) ----------
    const HASH = "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92"; // "jisan2026"
    
    // DOM এলিমেন্ট
    const loginScr = document.getElementById('loginScreen');
    const adminPnl = document.getElementById('adminPanel');
    const pwdInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginErr = document.getElementById('loginError');

    // SHA‑256 ফাংশন
    async function sha256(msg) {
      const buf = new TextEncoder().encode(msg);
      const hashBuf = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function doLogin() {
      const val = pwdInput.value;
      if (!val) return;
      const h = await sha256(val);
      if (h === HASH) {
        loginScr.classList.add('hidden');
        adminPnl.classList.remove('hidden');
        renderPreview();
      } else {
        loginErr.innerText = 'পাসওয়ার্ড ভুল';
        pwdInput.value = '';
      }
    }
    loginBtn.onclick = doLogin;
    pwdInput.addEventListener('keypress', e => e.key === 'Enter' && doLogin());

    // ---------- ডিফল্ট ডাটা ----------
    const def = {
      name: 'Jisan Al Mahmud',
      tagline: 'Web Developer | Frontend Specialist',
      avail: 'Available',
      marquee: 'Assalamualaikum welcome to JISAN website ✦ Web solutions ✦',
      email: 'jisan0538@gmail.com',
      phone: '01309488169',
      wa: '+880 1309 488169',
      fb: 'economist.jisan',
      services: 'Web Design, Frontend Dev, Landing Pages, Support & Fixes'
    };

    // ইনপুট রেফারেন্স
    const fName = document.getElementById('fullName');
    const fTag = document.getElementById('tagline');
    const fAvail = document.getElementById('availability');
    const fMarq = document.getElementById('marqueeText');
    const fEmail = document.getElementById('email');
    const fPhone = document.getElementById('phone');
    const fWa = document.getElementById('whatsapp');
    const fFb = document.getElementById('facebookUser');
    const fServ = document.getElementById('servicesInput');
    const previewDiv = document.getElementById('previewArea');
    const copyMsg = document.getElementById('copyMsg');

    function setDefaults() {
      fName.value = def.name;
      fTag.value = def.tagline;
      fAvail.value = def.avail;
      fMarq.value = def.marquee;
      fEmail.value = def.email;
      fPhone.value = def.phone;
      fWa.value = def.wa;
      fFb.value = def.fb;
      fServ.value = def.services;
    }

    function renderPreview() {
      const name = fName.value.trim() || def.name;
      const tag = fTag.value.trim() || def.tagline;
      const avail = fAvail.value.trim() || def.avail;
      const marq = fMarq.value.trim() || def.marquee;
      const email = fEmail.value.trim() || def.email;
      const phone = fPhone.value.trim() || def.phone;
      const wa = fWa.value.trim() || def.wa;
      const fb = fFb.value.trim() || def.fb;
      let servList = fServ.value.split(',').map(s=>s.trim()).filter(s=>s);
      if(!servList.length) servList = ['Web Design','Frontend Dev','Landing Pages','Support'];
      
      const servHTML = servList.slice(0,4).map(s => 
        `<div style="background:#f1f6fe;border-radius:2rem;padding:0.65rem;font-size:0.8rem;font-weight:600;"><i class="fas fa-code"></i> ${s}</div>`
      ).join('');
      
      const waNum = wa.replace(/\D/g,'');
      previewDiv.innerHTML = `
        <div style="text-align:center"><img src="jisan.jpeg" style="width:110px;height:110px;border-radius:50%;border:3px solid white;box-shadow:0 12px 22px -8px rgba(0,0,0,0.15);" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 100 100\\'%3E%3Ccircle cx=\\'50\\' cy=\\'50\\' r=\\'48\\' fill=\\'%231e3c72\\'/%3E%3Ctext x=\\'50\\' y=\\'68\\' font-size=\\'46\\' fill=\\'%23fff\\' font-family=\\'Arial\\'%3EJ%3C/text%3E%3C/svg%3E';"></div>
        <div class="signature-preview">${name}</div>
        <div class="badge-wrap">
          <span class="badge"><i class="fas fa-graduation-cap"></i> Student</span>
          <span class="badge"><i class="fas fa-laptop-code"></i> Freelancer</span>
          <span class="badge"><i class="fas fa-check-circle"></i> ${avail}</span>
        </div>
        <div style="text-align:center;background:#eef3fc;padding:8px 16px;border-radius:50px;margin:12px 0">${tag}</div>
        <div style="background:#eef3fc;border-radius:60px;padding:10px;overflow:hidden;white-space:nowrap;margin:16px 0">
          <div style="display:inline-block;animation:scroll 14s linear infinite;font-weight:600;color:#1e3c72;"><i class="fas fa-hand-peace"></i> ${marq}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:20px 0">
          <a href="mailto:${email}" style="background:#fff;border:1px solid #ccc;padding:8px;border-radius:40px;text-align:center;text-decoration:none;color:#1e3c72"><i class="fas fa-envelope"></i></a>
          <a href="tel:${phone}" style="background:#1e3c72;color:#fff;padding:8px;border-radius:40px;text-align:center;text-decoration:none"><i class="fas fa-phone"></i></a>
          <a href="https://wa.me/${waNum}" target="_blank" style="background:#25D366;color:#fff;padding:8px;border-radius:40px;text-align:center;text-decoration:none"><i class="fab fa-whatsapp"></i></a>
          <a href="https://facebook.com/${fb}" target="_blank" style="background:#fff;border:1px solid #ccc;padding:8px;border-radius:40px;text-align:center;text-decoration:none;color:#1e3c72"><i class="fab fa-facebook-f"></i></a>
        </div>
        <div style="font-weight:700;margin:10px 0"><i class="fas fa-crown"></i> what I deliver</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">${servHTML}</div>
        <div style="background:#eef4fc;border-radius:24px;padding:12px;display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between">
          <span><i class="fas fa-envelope"></i> ${email}</span>
          <span><i class="fas fa-phone"></i> ${phone}</span>
          <span><i class="fab fa-whatsapp"></i> ${wa}</span>
        </div>
        <div style="text-align:center;margin-top:20px;font-size:0.7rem;color:#5f6e82;">© 2026 ${name.split(' ')[0]}</div>
        <style>@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}</style>
      `;
    }

    // সম্পূর্ণ সাইট HTML জেনারেট
    function generateSiteHTML() {
      const name = fName.value.trim() || def.name;
      const tag = fTag.value.trim() || def.tagline;
      const avail = fAvail.value.trim() || def.avail;
      const marq = fMarq.value.trim() || def.marquee;
      const email = fEmail.value.trim() || def.email;
      const phone = fPhone.value.trim() || def.phone;
      const wa = fWa.value.trim() || def.wa;
      const fb = fFb.value.trim() || def.fb;
      let servList = fServ.value.split(',').map(s=>s.trim()).filter(s=>s);
      if(!servList.length) servList = ['Web Design','Frontend Dev','Landing Pages','Support'];
      const servItems = servList.slice(0,4).map(s => `<div class="service-chip"><i class="fas fa-code"></i> ${s}</div>`).join('');
      const waNum = wa.replace(/\D/g,'');
      return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${name}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Alex+Brush&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#eef2f9;font-family:Inter,sans-serif;padding:1.5rem;display:flex;justify-content:center;min-height:100vh;align-items:center}.card{max-width:560px;background:#fff;border-radius:2rem;padding:1.8rem;box-shadow:0 20px 35px -12px rgba(0,0,0,0.1)}.avatar{width:110px;height:110px;border-radius:50%;border:3px solid white}.signature{font-family:'Alex Brush',cursive;font-size:2.5rem;text-align:center;color:#0b2b4f}.badge{background:#1e3c72;color:#fff;padding:4px 12px;border-radius:40px;font-size:.75rem}.marquee{background:#eef3fc;border-radius:60px;padding:10px;overflow:hidden;white-space:nowrap}@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}</style></head><body><div class="card"><div style="text-align:center"><img src="jisan.jpeg" class="avatar" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 100 100\\'%3E%3Ccircle cx=\\'50\\' cy=\\'50\\' r=\\'48\\' fill=\\'%231e3c72\\'/%3E%3Ctext x=\\'50\\' y=\\'68\\' font-size=\\'46\\' fill=\\'%23fff\\'%3EJ%3C/text%3E%3C/svg%3E';"></div><div class="signature">${name}</div><div style="display:flex;justify-content:center;gap:8px;margin:10px"><span class="badge">Student</span><span class="badge">Freelancer</span><span class="badge">${avail}</span></div><div style="text-align:center;margin:10px">${tag}</div><div class="marquee"><div style="display:inline-block;animation:scroll 14s linear infinite;font-weight:600;color:#1e3c72">${marq}</div></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:20px 0"><a href="mailto:${email}" style="background:#fff;border:1px solid #ccc;padding:8px;border-radius:40px;text-align:center;color:#1e3c72;text-decoration:none"><i class="fas fa-envelope"></i></a><a href="tel:${phone}" style="background:#1e3c72;color:#fff;padding:8px;border-radius:40px;text-align:center;text-decoration:none"><i class="fas fa-phone"></i></a><a href="https://wa.me/${waNum}" style="background:#25D366;color:#fff;padding:8px;border-radius:40px;text-align:center;text-decoration:none"><i class="fab fa-whatsapp"></i></a><a href="https://facebook.com/${fb}" style="background:#fff;border:1px solid #ccc;padding:8px;border-radius:40px;text-align:center;color:#1e3c72;text-decoration:none"><i class="fab fa-facebook-f"></i></a></div><div style="font-weight:700;margin:10px 0">what I deliver</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0">${servItems}</div><div style="background:#eef4fc;border-radius:24px;padding:12px;display:flex;flex-wrap:wrap;gap:8px"><span>📧 ${email}</span><span>📞 ${phone}</span><span>💬 ${wa}</span></div><div style="text-align:center;margin-top:20px;font-size:.7rem">© 2026 ${name.split(' ')[0]}</div></div></body></html>`;
    }

    async function copyHTML() {
      try {
        await navigator.clipboard.writeText(generateSiteHTML());
        copyMsg.innerText = '✅ HTML কপি হয়েছে! index.html আপডেট করুন।';
      } catch { copyMsg.innerText = '❌ কপি ব্যর্থ'; }
      setTimeout(() => copyMsg.innerText = '', 3000);
    }

    // ইভেন্ট বাইন্ডিং
    document.getElementById('resetBtn').onclick = () => { setDefaults(); renderPreview(); };
    document.getElementById('previewBtn').onclick = renderPreview;
    document.getElementById('copyBtn').onclick = copyHTML;
    // ইনিশিয়ালাইজ
    setDefaults();
  })();
</script>
</body>
</html>
